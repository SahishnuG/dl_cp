databases:
  - name: karmafit-db
    plan: free
    databaseName: karmafit_db
    user: karmafit

services:
  - type: web
    name: karmafit-backend
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install uv && uv sync
    startCommand: uv run uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: karmafit-db
          property: connectionString
      - key: CLERK_JWKS_URL
        sync: false
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_AUDIENCE
        sync: false

  - type: web
    name: karmafit-frontend
    runtime: node
    rootDir: frontend
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run build
    startCommand: npm run start -- -p $PORT
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
